name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Rust check
        run: cargo check
        working-directory: src-tauri

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - run: npm ci

      - name: Build Tauri
        run: npx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Package portable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "src-tauri/target/${{ matrix.target }}/release/bundle/nsis"
          Compress-Archive -Path "$dir/*" -DestinationPath "sfinder-gui-portable-windows.zip"

      - name: Package portable (Linux)
        if: runner.os == 'Linux'
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/appimage
          tar -czf ../../../../../sfinder-gui-portable-linux.tar.gz *

      - name: Package portable (macOS)
        if: runner.os == 'macOS'
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/dmg
          tar -czf ../../../../../sfinder-gui-portable-macos.tar.gz *

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            sfinder-gui-portable-windows.zip
            sfinder-gui-portable-linux.tar.gz
            sfinder-gui-portable-macos.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
