name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - run: npm ci

      - name: Download sfinder.jar
        shell: bash
        run: |
          gh release download v1.43 -R knewjade/solution-finder -p "solution-finder-1.43.zip"
          unzip -o solution-finder-1.43.zip -d /tmp/sfinder
          mkdir -p src-tauri/binaries
          cp /tmp/sfinder/sfinder.jar src-tauri/binaries/sfinder.jar
          ls -lh src-tauri/binaries/sfinder.jar
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build Tauri
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npx tauri build --target ${{ matrix.target }}
          else
            npx tauri build
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Set bundle path
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            echo "BUNDLE_DIR=src-tauri/target/${{ matrix.target }}/release/bundle" >> $GITHUB_ENV
          else
            echo "BUNDLE_DIR=src-tauri/target/release/bundle" >> $GITHUB_ENV
          fi

      - name: Set binary path
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            echo "BIN_DIR=src-tauri/target/${{ matrix.target }}/release" >> $GITHUB_ENV
          else
            echo "BIN_DIR=src-tauri/target/release" >> $GITHUB_ENV
          fi

      - name: Package portable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Copy jar into release dir for bundling
          if (Test-Path "src-tauri/binaries/sfinder.jar") {
            Copy-Item "src-tauri/binaries/sfinder.jar" "$env:BIN_DIR/"
          }
          $files = Get-ChildItem "$env:BIN_DIR" -File | Where-Object {
            $_.Extension -notin ".d",".pdb",".lib",".exp" -and
            $_.Name -notlike "*.cargo*" -and
            $_.Name -notlike "*lock*" -and
            $_.Directory.Name -ne "bundle"
          }
          Compress-Archive -Path $files.FullName -DestinationPath "sfinder-gui-portable-windows.zip"

      - name: Package portable (Linux)
        if: runner.os == 'Linux'
        run: |
          cp $BUNDLE_DIR/appimage/*.AppImage sfinder-gui-portable-linux.AppImage
          tar -czf sfinder-gui-portable-linux.tar.gz $BUNDLE_DIR/appimage/*.AppImage

      - name: Package portable (macOS)
        if: runner.os == 'macOS'
        run: |
          APP=$(find $BUNDLE_DIR -name "*.app" -type d | head -1)
          if [ -d "$APP" ]; then
            tar -czf sfinder-gui-portable-macos.tar.gz -C "$(dirname "$APP")" "$(basename "$APP")"
          else
            echo "No .app found, skipping portable"
          fi

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BUNDLE_DIR }}/msi/*.msi
            ${{ env.BUNDLE_DIR }}/nsis/*.exe
            ${{ env.BUNDLE_DIR }}/appimage/*.AppImage
            ${{ env.BUNDLE_DIR }}/dmg/*.dmg
            sfinder-gui-portable-windows.zip
            sfinder-gui-portable-linux.tar.gz
            sfinder-gui-portable-linux.AppImage
            sfinder-gui-portable-macos.tar.gz
          body: |
            See [commits](https://github.com/Richard969/sfinder-gui/commits/master) for changes.
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
