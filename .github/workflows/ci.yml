name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Rust check
        run: cargo check
        working-directory: src-tauri

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - run: npm ci

      - name: Build Tauri
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npx tauri build --target ${{ matrix.target }}
          else
            npx tauri build
          fi

      - name: Set bundle path
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            echo "BUNDLE_DIR=src-tauri/target/${{ matrix.target }}/release/bundle" >> $GITHUB_ENV
          else
            echo "BUNDLE_DIR=src-tauri/target/release/bundle" >> $GITHUB_ENV
          fi

      - name: Set binary path
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            echo "BIN_DIR=src-tauri/target/${{ matrix.target }}/release" >> $GITHUB_ENV
          else
            echo "BIN_DIR=src-tauri/target/release" >> $GITHUB_ENV
          fi

      - name: Package portable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "src-tauri/binaries/sfinder.jar") {
            Copy-Item "src-tauri/binaries/sfinder.jar" "$env:BIN_DIR/"
          }
          $files = Get-ChildItem "$env:BIN_DIR" -Exclude "bundle",".cargo-lock","*.d" | Where-Object { -not $_.PSIsContainer }
          Compress-Archive -Path $files.FullName -DestinationPath "sfinder-gui-windows-portable.zip"

      - name: Package portable (Linux)
        if: runner.os == 'Linux'
        run: |
          cp $BUNDLE_DIR/appimage/*.AppImage sfinder-gui-linux-portable.AppImage
          tar -czf sfinder-gui-linux-portable.tar.gz $BUNDLE_DIR/appimage/*.AppImage

      - name: Package portable (macOS)
        if: runner.os == 'macOS'
        run: |
          APP=$(find $BUNDLE_DIR -name "*.app" -type d | head -1)
          if [ -d "$APP" ]; then
            tar -czf sfinder-gui-portable-macos.tar.gz -C "$(dirname "$APP")" "$(basename "$APP")"
          else
            echo "No .app found, skipping portable"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfinder-gui-${{ matrix.os }}
          path: |
            ${{ env.BUNDLE_DIR }}/msi/*.msi
            ${{ env.BUNDLE_DIR }}/nsis/*.exe
            ${{ env.BUNDLE_DIR }}/appimage/*.AppImage
            ${{ env.BUNDLE_DIR }}/dmg/*.dmg
            sfinder-gui-windows-portable.zip
            sfinder-gui-linux-portable.tar.gz
            sfinder-gui-linux-portable.AppImage
            sfinder-gui-macos-portable.tar.gz
