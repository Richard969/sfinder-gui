name: Rust Tests

on:
  push:
    branches: [master, main, feat/screenshot-recognition]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libglib2.0-dev
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cd src-tauri && cargo test -- --test-threads=1
