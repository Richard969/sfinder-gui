<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:rgba(0,0,0,0.75);
  color:#fff;font:13px/1 sans-serif;
  display:flex;align-items:center;justify-content:center;
  padding:6px 14px;white-space:nowrap;user-select:none;
  border-radius:8px;
}
</style>
</head>
<body id="txt">Drag to select the Tetris board  |  Esc to cancel</body>
<script>
const invoke = window.__TAURI_INTERNALS__.invoke;
// Poll for text updates (simple, no event system needed)
setInterval(async () => {
  try {
    const t = await invoke('get_info_text');
    document.getElementById('txt').textContent = t;
  } catch {}
}, 100);
</script>
</html>
