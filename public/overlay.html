<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Region</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body { cursor: crosshair; background: transparent; }

canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
}

#close {
  position: fixed;
  top: 12px; right: 12px; z-index: 20;
  width: 32px; height: 32px; border-radius: 50%; border: none;
  background: rgba(0,0,0,0.6); color: #fff;
  font: 18px sans-serif; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
#close:hover { background: rgba(200,50,50,0.8); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="close">✕</button>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const invoke = window.__TAURI_INTERNALS__.invoke;

let imgs = [];
let sx = 0, sy = 0, dragging = false;
let infoText = 'Drag to select the Tetris board  |  Esc to cancel';

function resize() {
  c.width = window.innerWidth;
  c.height = window.innerHeight;
  redraw();
}

function redraw() {
  ctx.clearRect(0, 0, c.width, c.height);

  // Draw all monitor screenshots
  for (const m of imgs) {
    if (m.img) ctx.drawImage(m.img, m.x, m.y, m.w, m.h);
  }

  // Darken overlay
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(0, 0, c.width, c.height);

  // Info bar — rendered on canvas at bottom-center
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  const barH = 36, barPad = 16;
  ctx.font = '13px monospace';
  const txtW = ctx.measureText(infoText).width;
  const barW = txtW + barPad * 2;
  const bx = (c.width - barW) / 2;
  const by = c.height - barH - 16;
  const r = 6;
  ctx.beginPath();
  ctx.roundRect(bx, by, barW, barH, r);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillText(infoText, c.width / 2, by + barH / 2);

  // Clear dark overlay over selection area
  if (dragging || document.getElementById('sel')) {
    // Selection is drawn on-the-fly, no CSS element
  }
}

async function load() {
  try {
    const data = await invoke('get_capture_data');
    for (const m of data.monitors) {
      const img = new Image();
      img.src = m.dataUrl;
      imgs.push({ img, x: m.x, y: m.y, w: m.width, h: m.height });
    }
    await Promise.all(imgs.map(m =>
      new Promise(res => { if (m.img.complete) res(); else m.img.onload = res; })
    ));
    resize();
  } catch (e) {
    infoText = 'Error: ' + e;
    resize();
  }
}

c.addEventListener('mousedown', e => {
  sx = e.clientX; sy = e.clientY;
  dragging = true;
});

c.addEventListener('mousemove', e => {
  if (!dragging) return;
  const x = Math.min(sx, e.clientX), y = Math.min(sy, e.clientY);
  const w = Math.abs(e.clientX - sx), h = Math.abs(e.clientY - sy);
  redraw();
  // Draw selection rectangle
  ctx.strokeStyle = 'rgba(255,50,50,0.85)';
  ctx.lineWidth = 2;
  ctx.fillStyle = 'rgba(255,50,50,0.08)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeRect(x, y, w, h);
  infoText = `Selection: ${w} × ${h}  —  release to capture`;
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  const barH = 36, barPad = 16;
  ctx.font = '13px monospace';
  const txtW = ctx.measureText(infoText).width;
  const barW = txtW + barPad * 2;
  const bx = (c.width - barW) / 2;
  const by = c.height - barH - 16;
  ctx.beginPath();
  ctx.roundRect(bx, by, barW, barH, 6);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillText(infoText, c.width / 2, by + barH / 2);
});

c.addEventListener('mouseup', async e => {
  if (!dragging) return;
  dragging = false;
  const x = Math.min(sx, e.clientX), y = Math.min(sy, e.clientY);
  const w = Math.abs(e.clientX - sx), h = Math.abs(e.clientY - sy);
  if (w < 10 || h < 10) {
    infoText = 'Selection too small. Drag again.';
    redraw();
    return;
  }
  infoText = 'Recognizing...';
  redraw();
  try {
    await invoke('crop_and_recognize', { x, y, w, h });
    await invoke('close_overlay');
  } catch (err) {
    infoText = 'Error: ' + err;
    redraw();
  }
});

document.addEventListener('keydown', async e => {
  if (e.key === 'Escape') await invoke('close_overlay');
});

document.getElementById('close').onclick = async () => await invoke('close_overlay');
window.addEventListener('resize', resize);

// Minimize main window and start
(async () => {
  try {
    const main = await import('@tauri-apps/api/window');
    const win = main.getCurrentWindow();
    // Can't easily minimize main from here, so just load
  } catch {}
  load();
})();
</script>
</body>
</html>
